#version: '3.8'
services:
  db:
    image: postgres:15
    container_name: odoo_panel
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # NOTE: postgres official image ignores POSTGRES_PORT; listens on 5432
    ports:
      - "5432:5432"             # host:container (connect from host on 5432)
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    networks:
      - odoo-net

  pgadmin:
    image: dpage/pgadmin4:9.13
    container_name: deployer_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data_volume:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - odoo-net

  odoo:
    image: odoo:19.0
    command: ["odoo", "--proxy-mode"]
    depends_on:
      - db
    restart: always
    env_file:
      - .env
    environment:
      HOST: db
      PORT: 5432
      USER: ${POSTGRES_USER}
      PASSWORD: ${ODOO_DB_PASSWORD}
      ADMIN_PASSWORD: ${ODOO_ADMIN_PASSWORD}
    ports:
      - "8069:8069"
      - "8072:8072"             # longpolling (optional)
    volumes:
      - odoo-web-data:/var/lib/odoo
      #- /etc/timezone:/etc/timezone:ro
      #- /etc/localtime:/etc/localtime:ro
#      - ./entrypoint.sh:/entrypoint.sh
      - ./addons:/mnt/extra-addons
      - ./config:/etc/odoo
    networks:
      - odoo-net

volumes:
  odoo-web-data:
  pgadmin_data_volume:
  odoo-db-data:
  addons:
  config:
networks:
  odoo-net:
    driver: bridge
